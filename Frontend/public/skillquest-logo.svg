<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect width="200" height="200" rx="40" fill="url(#grad1)" opacity="0.08"/>

  <!-- Hexagon shield -->
  <path d="M100 28 L148 55 L148 109 L100 136 L52 109 L52 55 Z"
    stroke="url(#grad1)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- Inner hex -->
  <path d="M100 44 L136 65 L136 107 L100 128 L64 107 L64 65 Z"
    fill="url(#grad1)" opacity="0.12"/>

  <!-- Code brackets < > -->
  <path d="M78 76 L62 86 L78 96" stroke="#00d4ff" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <path d="M122 76 L138 86 L122 96" stroke="#7c3aed" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Slash -->
  <line x1="106" y1="72" x2="94" y2="100" stroke="url(#grad1)" stroke-width="4"
    stroke-linecap="round" filter="url(#glow)"/>

  <!-- SkillQuest text -->
  <text x="100" y="163" font-family="system-ui, sans-serif" font-size="18"
    font-weight="700" fill="url(#grad1)" text-anchor="middle" letter-spacing="2">
    SKILLQUEST
  </text>

  <!-- Bottom glow line -->
  <line x1="52" y1="172" x2="148" y2="172" stroke="url(#grad1)"
    stroke-width="1.5" opacity="0.5"/>
</svg>
